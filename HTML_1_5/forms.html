            <label>About Me</label><br>

            </fieldset>
            
        </form>

        <h2>survey form</h2>
        <form>
            <label >User name</label><br>
            <input type="text" maxlength="10" required>
            <br>
            <label>Age</label><br>
            <input type="number" min="18" max="60">
            <br>
            <label>Favorite  programming language</label><br>
            <input type="text" list="languages">
            <datalist id="languages">
                <option>HTML</option>
                <option>JS</option>
                <option>CSS</option>
                <option>Python</option>

            </datalist>
        </form>
