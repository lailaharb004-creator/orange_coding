<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            body{
                color:#00101F;

            }
            input{
                display: block;
                margin: 5px;
                
            }

            .logo{
                color: #0a66c2;
                font-weight: bolder;
            }
            .textfield{
                border-style:solid;
                border-radius:2px;
                border-color:black;
                border-width: 1px;
                padding:7px 10px;
                width:200px;
                
            }
            .para_one{
                color: #0a66c2;
                font-weight:bold;
            }

            .button_1{
                background-color: #0a66c2;
                color:white;

            }
            .one{
                margin: auto;
                width: fit-content;
                border: solid;
                border-radius: 5px;
                border-color: whitesmoke;
                box-shadow:1px 1px 10px  2px whitesmoke;
                padding: 10px;
            }
            .para_two{
                text-align: center;
            }
            
            
           
        </style>


    </head>
    <body>
        <p class="logo">Linked<i class="fa-brands fa-linkedin"></i></p>
        <div class="one">
            <h1>sign in</h1>

            <p>Stay update on your professional world</p>

            <form>
                <input type="text"       placeholder="Email or Phone" class="textfield">
                <input type="password"   placeholder="Password"       class="textfield"> 
                <span style="color: #0a66c2;">show</span>


                <p class="para_one">Forgot password?</p>

                <input type="submit"     value="Sign in"              class="button_1">
                <p>or</p>
                <input type="submit"     value="sign in with Apple"   class="button_2">
                <i class="fa-brands fa-apple"></i>

            </form>

        </div>
        <p class="para_two">New to LinkedIn? <span style="color: #0a66c2;">Join now</span></p>
    </body>
</html>******
