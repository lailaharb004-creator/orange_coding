<!DOCTYPE html>
<html>
    <head>
        <style>
          body{
            display: flex;
            justify-content: center;
          }
          div{
            border: 1px solid;
            background: #ddd;
          }
          
          .one{
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background-color: white;
            padding: 15px;
            border: none;
          }
        </style>
    </head>
    <body>
        <div class="one">
            <div>
                <img src="animal.png">
            </div>
            <div>
                <img src="cooking.png">
            </div>
            <div>
                <img src="cute.png">
            </div>
            <div>
                <img src="painter.png">
            </div>
            <div>
                <img src="donatello.png">
            </div>
            <div>
                <img src="square.png">
            </div>
    </div>

    </body>
</html>
