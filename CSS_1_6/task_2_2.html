<!DOCTYPE html>
<html>
    <head>
        
        <style>
            *{
                margin:0;
                padding:0;
            }
            
            .nav_bar{
                display: flex;
                justify-content: space-between;
              
               margin:20px 300px;
               padding:10px;
               background-color: #f8f9fa;
               color:#6f7275;

            }
            
            .nav_bar a{
                text-decoration: none;
                padding: 0 2px;
                color:#6f7275;
            }

            }
            .login_form{
                width: 50%;

            }

            }

                  outline: none;
            }

        <div class="nav_bar">
            <p>Scratch</p>
            <div class="nav_bar_links">

                <a href="#">Login</a>
            </div>
            

        </div>
        <div class="login_form">
            <label for="e">Email</label>
            <input type="email" id="e">
            <label for="p">Password</label>
            <input type="password">
            <button>Login</button>
        </div>
        

    </body>
