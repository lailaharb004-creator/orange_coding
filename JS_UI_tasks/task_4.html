<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Text Editor</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    select, input[type="checkbox"] {
        margin-right: 10px;
        margin-bottom: 10px;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 10px;
        box-sizing: border-box;
        font-size: 12pt;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<div>
    <label for="fontSelect">Font:</label>
    <select id="fontSelect">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Tahoma">Tahoma</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
    </select>

    <label for="sizeSelect">Size:</label>
    <select id="sizeSelect">
        <option value="10pt">10pt</option>
        <option value="12pt" selected>12pt</option>
        <option value="14pt">14pt</option>
        <option value="16pt">16pt</option>
        <option value="18pt">18pt</option>
        <option value="20pt">20pt</option>
    </select>

    <label><input type="checkbox" id="italic"> Italic</label>
    <label><input type="checkbox" id="bold"> Bold</label>
    <label><input type="checkbox" id="underline"> Underline</label>
</div>

<textarea id="editor">The quick brown fox jumps over the lazy dog</textarea>

<script>
    const editor = document.getElementById("editor");
    const fontSelect = document.getElementById("fontSelect");
    const sizeSelect = document.getElementById("sizeSelect");
    const italicCheck = document.getElementById("italic");
    const boldCheck = document.getElementById("bold");
    const underlineCheck = document.getElementById("underline");

    function updateStyle() {
        editor.style.fontFamily = fontSelect.value;
        editor.style.fontSize = sizeSelect.value;
        editor.style.fontStyle = italicCheck.checked ? "italic" : "normal";
        editor.style.fontWeight = boldCheck.checked ? "bold" : "normal";
        editor.style.textDecoration = underlineCheck.checked ? "underline" : "none";
    }

    fontSelect.addEventListener("change", updateStyle);
    sizeSelect.addEventListener("change", updateStyle);
    italicCheck.addEventListener("change", updateStyle);
    boldCheck.addEventListener("change", updateStyle);
    underlineCheck.addEventListener("change", updateStyle);
</script>

</body>
</html>
